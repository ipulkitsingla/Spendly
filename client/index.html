<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('spendly_theme');
          document.documentElement.setAttribute('data-theme', t === 'light' || t === 'dark' ? t : 'dark');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="application-name" content="Spendly" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Spendly" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Spendly</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
